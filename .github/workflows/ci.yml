name: CI

# 全PR・main push で品質ゲートを必須化（第三者レビュー P0-6）。
# typecheck（全パッケージ）／test（host・client）／依存監査／リリース署名検証。
# CF Workers への deploy は含めない（手動運用・CLAUDE.md）。
on:
  pull_request: {}
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Install deps
        run: npm ci
      - name: Typecheck (all packages)
        run: npm run typecheck
      - name: Test (host + client)
        run: npm test
      - name: Build release bundle (verify it builds)
        run: npm -w apps/client run release
      - name: Verify release signing (sign + verify round-trip)
        env:
          # CI 専用の使い捨て署名鍵で署名→検証が通ることを確認する（本番鍵は使わない）。
          RELEASE_SIGNING_JWK: ${{ secrets.RELEASE_SIGNING_JWK }}
        run: |
          set -e
          tar -czf bundle.tgz -C apps/client/release .
          if [ -z "$RELEASE_SIGNING_JWK" ]; then
            echo "RELEASE_SIGNING_JWK 未設定のため署名検証はスキップ（PRフォーク等）。"
            exit 0
          fi
          SIG="$(node apps/client/scripts/sign-release.mjs bundle.tgz)"
          test -n "$SIG"
          echo "release signature generated OK (len=${#SIG})"

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      # 本番依存の high/critical で失敗（ブロッキング）。ただし既知・ビルド時のみの advisory は許可リスト管理。
      #   - GHSA-gv7w-rqvm-qjhr / GHSA-g7r4-m6w7-qqqr：esbuild（ビルド時のみ＝デプロイ成果物に非搭載。
      #     片方は Deno 専用で npm 利用では非該当、もう片方は Windows dev サーバのみ）
      # ※ astro 自身の advisory（define:vars XSS 等）は astro 6 更新で解消済み（許可リストから撤去）。
      # 新規の high/critical は引き続きブロックされる（audit-gate.mjs）。
      - name: Audit production deps (block on new high/critical; known build-time advisories allowlisted)
        run: node apps/client/scripts/audit-gate.mjs GHSA-gv7w-rqvm-qjhr GHSA-g7r4-m6w7-qqqr
      # dev依存（wrangler由来 undici 等）は情報提供のみ・ブロックしない。
      - name: Audit all deps (informational)
        run: npm audit || true
